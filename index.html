<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>For You</title>
  <link rel="preload" as="image" href="assets/bear-welcome.png" />
  <link rel="preload" as="image" href="assets/bear-name.png" />
  <link rel="preload" as="image" href="assets/bear-letter.png" />
  <link rel="preload" as="image" href="assets/bear-countdown-3.png" />
  <link rel="preload" as="image" href="assets/bear-countdown-2.png" />
  <link rel="preload" as="image" href="assets/bear-countdown-1.png" />
  <link rel="preload" as="image" href="assets/bear-peek.png" />
  <link rel="preload" as="image" href="assets/bear-flower.png" />
  <link rel="preload" as="image" href="assets/bear-point.png" />
  <style>
    :root {
      --bg1: #fff7f1;
      --bg2: #ffe8ef;
      --card: rgba(255, 255, 255, 0.78);
      --text: #3b3134;
      --muted: #7d6d72;
      --accent: #d9788f;
      --accent-dark: #c55f79;
      --line: rgba(217, 120, 143, 0.22);
      --shadow: 0 24px 70px rgba(97, 57, 69, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 255, 255, 0.95), transparent 34%),
        radial-gradient(circle at 90% 85%, rgba(255, 210, 224, 0.88), transparent 34%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .bg-shape {
      position: fixed;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      filter: blur(1px);
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }

    .shape-one {
      width: 130px;
      height: 130px;
      top: 9%;
      right: -35px;
    }

    .shape-two {
      width: 90px;
      height: 90px;
      left: -24px;
      bottom: 12%;
      animation-delay: -2s;
    }

    .phone-frame {
      width: min(100%, 430px);
      margin: auto 0;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: min(520px, calc(100svh - 36px));
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 34px 28px 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: visible;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.68), transparent 45%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      animation: fadeUp 420ms ease both;
    }

    .icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      margin-bottom: 22px;
      border-radius: 20px;
      background: rgba(217, 120, 143, 0.12);
      font-size: 25px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 7vw, 44px);
      line-height: 1.04;
      letter-spacing: -1.4px;
      font-weight: 720;
    }

    p {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .note {
      margin-top: 28px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.52);
      color: #66585d;
      font-size: 15px;
      line-height: 1.65;
    }

    .question {
      margin-top: 26px;
      color: var(--text);
      font-size: clamp(30px, 7vw, 42px);
      line-height: 1.08;
      letter-spacing: -1.2px;
    }

    .controls {
      position: relative;
      z-index: 1;
      margin-top: 34px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #65565b;
      font-size: 14px;
    }

    input {
      width: 100%;
      appearance: none;
      border: 1px solid rgba(125, 109, 114, 0.18);
      border-radius: 18px;
      padding: 16px 16px;
      font-size: 17px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.72);
      outline: none;
      transition: 160ms ease;
    }

    input:focus {
      border-color: rgba(217, 120, 143, 0.7);
      box-shadow: 0 0 0 4px rgba(217, 120, 143, 0.12);
    }

    button {
      width: 100%;
      min-height: 54px;
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: 0.1px;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(197, 95, 121, 0.25);
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: 0 8px 18px rgba(197, 95, 121, 0.22);
    }

    .secondary-button {
      background: rgba(255, 255, 255, 0.64);
      color: #7d6d72;
      box-shadow: none;
      border: 1px solid rgba(125, 109, 114, 0.15);
    }

    .progress {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 7px;
      justify-content: center;
      margin-top: 26px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(125, 109, 114, 0.2);
    }

    .dot.active {
      width: 22px;
      border-radius: 999px;
      background: rgba(217, 120, 143, 0.76);
    }

    .error {
      margin-top: 10px;
      min-height: 20px;
      color: #b84d67;
      font-size: 13px;
    }

    .soft-center {
      text-align: center;
      display: grid;
      place-items: center;
      min-height: 430px;
    }

    .soft-center .icon {
      margin-left: auto;
      margin-right: auto;
    }


    .mascot {
      display: block;
      width: 118px;
      height: 118px;
      object-fit: contain;
      margin: 0 auto 16px;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
    }

    .mascot-large {
      width: 132px;
      height: 132px;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 16px;
    }

    .soft-center .mascot {
      margin-left: auto;
      margin-right: auto;
    }



    .countdown-number {
      margin: 10px 0 8px;
      font-size: clamp(88px, 28vw, 138px);
      line-height: 0.9;
      letter-spacing: -6px;
      font-weight: 760;
      color: var(--accent-dark);
      text-shadow: 0 14px 40px rgba(197, 95, 121, 0.18);
      animation: popIn 420ms ease both;
    }

    .sure-copy {
      max-width: 310px;
      margin-left: auto;
      margin-right: auto;
    }

    .mini-note {
      margin-top: 14px;
      color: #8a7a7f;
      font-size: 14px;
      line-height: 1.55;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }



    @keyframes popIn {
      from { opacity: 0; transform: scale(0.86) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(18px); }
    }


    @media (max-height: 700px) {
      body {
        align-items: flex-start;
      }

      .card {
        min-height: auto;
        padding: 24px 20px 22px;
        border-radius: 28px;
      }

      .icon {
        width: 48px;
        height: 48px;
        margin-bottom: 16px;
        border-radius: 18px;
        font-size: 23px;
      }

      .mascot {
        width: 94px;
        height: 94px;
        margin-bottom: 10px;
        border-radius: 0;
      }

      .mascot-large {
        width: 104px;
        height: 104px;
        margin-bottom: 10px;
      }

      h1 {
        font-size: clamp(28px, 9vw, 38px);
      }

      p {
        margin-top: 14px;
        font-size: 15px;
        line-height: 1.5;
      }

      .note {
        margin-top: 20px;
        padding: 15px;
        border-radius: 20px;
        font-size: 14px;
        line-height: 1.5;
      }

      .controls {
        margin-top: 24px;
      }

      .soft-center {
        min-height: auto;
        padding: 20px 0 8px;
      }
    }

    @media (max-width: 380px) {
      body { padding: 16px; }
      .card { min-height: 500px; padding: 28px 22px 24px; border-radius: 28px; }
      p { font-size: 16px; }
    }


    /* Playful variant extras */
    .mascot {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .mascot.is-reacting {
      animation: mascotBounce 520ms cubic-bezier(.2,.8,.25,1) both;
    }

    .reaction-bubble {
      position: absolute;
      z-index: 8;
      top: 92px;
      left: 50%;
      max-width: min(82%, 300px);
      padding: 10px 14px;
      border: 1px solid rgba(217, 120, 143, 0.24);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.94);
      color: #66585d;
      font-size: 13px;
      line-height: 1.35;
      text-align: center;
      box-shadow: 0 10px 26px rgba(97, 57, 69, 0.12);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, 8px) scale(0.96);
      transition: opacity 160ms ease, transform 180ms ease;
    }

    .reaction-bubble.show {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .type-hint {
      margin-top: 9px;
      color: rgba(125, 109, 114, 0.72);
      font-size: 12px;
      text-align: center;
      transition: opacity 180ms ease;
    }

    .note.typewriter {
      min-height: 250px;
      white-space: pre-line;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .typing-caret::after {
      content: "";
      display: inline-block;
      width: 2px;
      height: 1em;
      margin-left: 3px;
      vertical-align: -0.12em;
      background: rgba(197, 95, 121, 0.72);
      animation: caretBlink 720ms steps(1) infinite;
    }

    .effects-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 30;
    }

    .love-particle {
      position: absolute;
      left: var(--x);
      bottom: -40px;
      font-size: var(--size);
      opacity: 0;
      filter: drop-shadow(0 5px 8px rgba(197, 95, 121, 0.12));
      animation: loveFloat var(--duration) ease-out var(--delay) forwards;
      transform: translateX(-50%) rotate(var(--rotate));
    }

    @keyframes mascotBounce {
      0%   { transform: translateY(0) rotate(0deg) scale(1); }
      28%  { transform: translateY(-9px) rotate(-2deg) scale(1.04); }
      58%  { transform: translateY(2px) rotate(2deg) scale(0.99); }
      100% { transform: translateY(0) rotate(0deg) scale(1); }
    }

    @keyframes caretBlink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }

    @keyframes loveFloat {
      0% {
        opacity: 0;
        transform: translate(-50%, 0) rotate(var(--rotate)) scale(0.75);
      }
      14% { opacity: 0.9; }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--drift)), -112vh) rotate(calc(var(--rotate) + 80deg)) scale(1.18);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .mascot.is-reacting,
      .love-particle,
      .typing-caret::after {
        animation: none !important;
      }
    }



    /* Final question reveal */
    .card.final-mode {
      border-color: rgba(217, 120, 143, 0.34);
      box-shadow:
        0 26px 78px rgba(97, 57, 69, 0.18),
        0 0 0 7px rgba(255, 255, 255, 0.20),
        0 0 70px rgba(217, 120, 143, 0.16);
      transition: box-shadow 700ms ease, border-color 700ms ease;
    }

    .final-stage .final-mascot,
    .final-stage .final-kicker,
    .final-stage .question-line,
    .final-stage .final-subcopy,
    .final-stage .final-button-wrap {
      opacity: 0;
      transform: translateY(12px) scale(0.97);
      transition:
        opacity 560ms ease,
        transform 660ms cubic-bezier(.2,.78,.24,1);
    }

    .final-stage .final-mascot.show,
    .final-stage .final-kicker.show,
    .final-stage .question-line.show,
    .final-stage .final-subcopy.show,
    .final-stage .final-button-wrap.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .final-stage .final-mascot.show {
      animation: finalBearFloat 3.8s ease-in-out 720ms infinite;
    }

    .final-question {
      margin: 20px 0 0;
      text-align: center;
    }

    .question-line {
      display: block;
      color: var(--text);
      font-weight: 720;
      letter-spacing: -1.1px;
      line-height: 1.02;
    }

    .question-line.first {
      font-size: clamp(25px, 6vw, 34px);
      color: #65565b;
    }

    .question-line.main {
      margin-top: 5px;
      font-size: clamp(34px, 8vw, 48px);
      color: var(--accent-dark);
      text-shadow: 0 10px 32px rgba(197, 95, 121, 0.18);
    }

    .final-subcopy {
      margin-top: 18px;
    }

    .final-button-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 999px;
    }

    .final-button-wrap button {
      margin-top: 0;
    }

    .final-button-wrap.show::after {
      content: "";
      position: absolute;
      top: -40%;
      left: -36%;
      width: 28%;
      height: 180%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.56),
        transparent
      );
      transform: rotate(18deg);
      pointer-events: none;
      animation: buttonShimmer 2.8s ease-in-out 500ms infinite;
    }

    .final-heartbeat {
      display: inline-block;
      animation: tinyHeartbeat 1.8s ease-in-out infinite;
    }

    @keyframes finalBearFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-5px) scale(1.015); }
    }

    @keyframes buttonShimmer {
      0%, 38% { left: -36%; opacity: 0; }
      48% { opacity: 1; }
      68%, 100% { left: 112%; opacity: 0; }
    }

    @keyframes tinyHeartbeat {
      0%, 100% { transform: scale(1); }
      12% { transform: scale(1.13); }
      24% { transform: scale(1); }
      36% { transform: scale(1.09); }
      48% { transform: scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .final-stage .final-mascot.show,
      .final-button-wrap.show::after,
      .final-heartbeat {
        animation: none !important;
      }
    }



    /* Gentle bear shake before changing pages */
    .mascot.page-transition-shake {
      transform-origin: 50% 82%;
      animation: pageTransitionShake var(--shake-duration, 900ms)
        cubic-bezier(.36,.07,.19,.97) both !important;
    }

    @keyframes pageTransitionShake {
      0%   { transform: translateX(0) rotate(0deg) scale(1); }
      12%  { transform: translateX(-2px) rotate(-0.8deg) scale(1.005); }
      24%  { transform: translateX(2px) rotate(0.8deg) scale(1.008); }
      36%  { transform: translateX(-2.5px) rotate(-1deg) scale(1.006); }
      48%  { transform: translateX(2.5px) rotate(1deg) scale(1.008); }
      60%  { transform: translateX(-1.8px) rotate(-0.7deg) scale(1.005); }
      72%  { transform: translateX(1.8px) rotate(0.7deg) scale(1.004); }
      84%  { transform: translateX(-1px) rotate(-0.35deg) scale(1.002); }
      100% { transform: translateX(0) rotate(0deg) scale(1); }
    }

    button:disabled {
      cursor: default;
    }

    @media (prefers-reduced-motion: reduce) {
      .mascot.page-transition-shake {
        animation: none !important;
      }
    }



    /* v14: final two-page polish */
    .final-mascot.bouquet-sway.show {
      animation:
        bouquetSway 2.8s ease-in-out 900ms infinite,
        finalBearFloat 3.8s ease-in-out 720ms infinite;
      transform-origin: 50% 86%;
    }

    .final-exit-button.is-leaving {
      opacity: 0.96;
      transform: scale(0.99);
    }

    .look-stage {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 680ms ease, transform 720ms cubic-bezier(.2,.78,.24,1);
    }

    .look-stage.show {
      opacity: 1;
      transform: translateY(0);
    }

    .look-stage .look-mascot {
      opacity: 0;
      transform: translateY(10px) scale(0.96);
      transition: opacity 560ms ease, transform 620ms cubic-bezier(.2,.78,.24,1);
    }

    .look-stage .look-mascot.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: pointOnce 920ms cubic-bezier(.2,.78,.24,1) 380ms both;
      transform-origin: 50% 86%;
    }

    .look-stage .look-title,
    .look-stage .look-subcopy {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 520ms ease, transform 620ms ease;
    }

    .look-stage .look-title.show,
    .look-stage .look-subcopy.show {
      opacity: 1;
      transform: translateY(0);
    }

    .look-subcopy {
      margin-top: 14px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    @keyframes bouquetSway {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      25% { transform: rotate(-1.2deg) translateY(-1px); }
      50% { transform: rotate(0.8deg) translateY(-2px); }
      75% { transform: rotate(-0.7deg) translateY(-1px); }
    }

    @keyframes pointOnce {
      0% { transform: translateY(0) rotate(0deg) scale(1); }
      36% { transform: translateY(-4px) rotate(-1.2deg) scale(1.035); }
      66% { transform: translateY(1px) rotate(0.7deg) scale(0.995); }
      100% { transform: translateY(0) rotate(0deg) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .final-mascot.bouquet-sway.show,
      .look-stage .look-mascot.show {
        animation: none !important;
      }
    }



    /* v16: smooth mood backgrounds and page crossfade */
    body {
      position: relative;
      isolation: isolate;
      background: #fff7f1;
    }

    .mood-layer {
      position: fixed;
      inset: 0;
      z-index: -3;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1050ms ease;
      will-change: opacity;
    }

    .mood-layer.active {
      opacity: 1;
    }

    .bg-shape {
      z-index: -2;
    }

    .phone-frame {
      position: relative;
      z-index: 1;
    }

    .card {
      opacity: 1;
      transform: translateY(0) scale(1);
      transition:
        opacity 280ms ease,
        transform 300ms cubic-bezier(.2,.75,.25,1),
        box-shadow 700ms ease,
        border-color 700ms ease;
    }

    .card.page-fade-out {
      opacity: 0;
      transform: translateY(7px) scale(0.988);
    }

    .card.page-fade-in {
      animation: pageCrossfadeIn 440ms cubic-bezier(.2,.75,.25,1) both;
    }

    @keyframes pageCrossfadeIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.988);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .mood-layer,
      .card,
      .card.page-fade-in {
        transition: none !important;
        animation: none !important;
      }
    }



    /* v17: subtle tap hint for the bear */
    .tap-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: max-content;
      max-width: calc(100% - 24px);
      margin: 0 auto 14px;
      padding: 8px 13px;
      border: 1px solid rgba(217, 120, 143, 0.34);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: #7a626a;
      font-size: 12px;
      line-height: 1;
      text-align: center;
      letter-spacing: 0.01em;
      box-shadow: 0 8px 20px rgba(197, 95, 121, 0.12);
      opacity: 0.98;
      user-select: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 180ms ease, transform 180ms ease;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }

    .tap-hint::before {
      content: "👆";
      font-size: 13px;
      transform: translateY(-0.5px);
    }

    .tap-hint .tap-word {
      color: var(--accent-dark);
      font-weight: 700;
    }

    .tap-hint.is-soft {
      animation: tapHintPulse 1.9s ease-in-out infinite;
    }

    @keyframes tapHintPulse {
      0%, 100% {
        opacity: 0.78;
        transform: translateY(0) scale(1);
      }
      50% {
        opacity: 1;
        transform: translateY(-2px) scale(1.025);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .tap-hint.is-soft {
        animation: none !important;
      }
    }

  </style>
</head>
<body>
  <div class="mood-layer mood-layer-a active" id="moodLayerA"></div>
  <div class="mood-layer mood-layer-b" id="moodLayerB"></div>
  <div class="bg-shape shape-one"></div>
  <div class="bg-shape shape-two"></div>

  <main class="phone-frame">
    <section class="card" id="app"></section>
  </main>
  <div class="effects-layer" id="effectsLayer" aria-hidden="true"></div>

  <script>
    let step = 0;
    let personName = "";
    let typingTimer = null;
    let typingFullText = "";
    let reactionTimer = null;
    let transitionLocked = false;
    let activeMoodLayer = 0;
    let firstRender = true;

    const app = document.getElementById("app");
    const effectsLayer = document.getElementById("effectsLayer");
    const moodLayers = [
      document.getElementById("moodLayerA"),
      document.getElementById("moodLayerB")
    ];

    const mascotAssets = [
      "assets/bear-welcome.png",
      "assets/bear-name.png",
      "assets/bear-letter.png",
      "assets/bear-countdown-3.png",
      "assets/bear-countdown-2.png",
      "assets/bear-countdown-1.png",
      "assets/bear-peek.png",
      "assets/bear-flower.png",
      "assets/bear-point.png"
    ];

    const moodBackgrounds = [
      "radial-gradient(circle at 15% 10%, rgba(255,255,255,.96), transparent 34%), radial-gradient(circle at 90% 85%, rgba(255,224,232,.78), transparent 35%), linear-gradient(145deg, #fff9f3, #ffedf2)",
      "radial-gradient(circle at 18% 12%, rgba(255,255,255,.96), transparent 34%), radial-gradient(circle at 88% 84%, rgba(255,218,230,.82), transparent 36%), linear-gradient(145deg, #fff7f2, #ffe9f0)",
      "radial-gradient(circle at 16% 10%, rgba(255,255,255,.94), transparent 33%), radial-gradient(circle at 88% 86%, rgba(246,197,214,.54), transparent 37%), linear-gradient(145deg, #fff6f1, #ffe2eb)",
      "radial-gradient(circle at 14% 9%, rgba(255,255,255,.93), transparent 32%), radial-gradient(circle at 90% 86%, rgba(241,180,201,.58), transparent 38%), linear-gradient(145deg, #fff5ef, #ffdee8)",
      "radial-gradient(circle at 14% 9%, rgba(255,255,255,.92), transparent 31%), radial-gradient(circle at 90% 86%, rgba(235,160,188,.62), transparent 39%), linear-gradient(145deg, #fff3ee, #ffd9e5)",
      "radial-gradient(circle at 13% 8%, rgba(255,255,255,.90), transparent 31%), radial-gradient(circle at 90% 87%, rgba(226,139,174,.66), transparent 40%), linear-gradient(145deg, #fff1ec, #ffd3e1)",
      "radial-gradient(circle at 13% 8%, rgba(255,255,255,.90), transparent 31%), radial-gradient(circle at 90% 87%, rgba(218,121,161,.68), transparent 41%), linear-gradient(145deg, #fff0eb, #ffcddd)",
      "radial-gradient(circle at 12% 8%, rgba(255,255,255,.88), transparent 30%), radial-gradient(circle at 88% 88%, rgba(206,99,146,.72), transparent 42%), linear-gradient(145deg, #ffefea, #ffc5d8)",
      "radial-gradient(circle at 16% 10%, rgba(255,255,255,.95), transparent 34%), radial-gradient(circle at 90% 85%, rgba(255,214,227,.76), transparent 36%), linear-gradient(145deg, #fff8f2, #ffe7ef)"
    ];


    function preloadMascots() {
      mascotAssets.forEach(src => {
        const image = new Image();
        image.decoding = "async";
        image.src = src;
      });
    }

    function applyMood(stepNumber, immediate = false) {
      const background = moodBackgrounds[stepNumber] || moodBackgrounds[0];

      if (immediate) {
        moodLayers[0].style.background = background;
        moodLayers[0].classList.add("active");
        moodLayers[1].classList.remove("active");
        activeMoodLayer = 0;
        return;
      }

      const nextLayer = activeMoodLayer === 0 ? 1 : 0;
      moodLayers[nextLayer].style.background = background;
      moodLayers[nextLayer].classList.add("active");
      moodLayers[activeMoodLayer].classList.remove("active");
      activeMoodLayer = nextLayer;
    }

    function fadeOutBefore(callback, totalDelay, fadeDuration = 280) {
      const fadeStart = Math.max(0, totalDelay - fadeDuration);

      setTimeout(() => {
        app.classList.remove("page-fade-in");
        app.classList.add("page-fade-out");
      }, fadeStart);

      setTimeout(callback, totalDelay);
    }

    function changePageWithoutShake(callback) {
      if (transitionLocked) return;
      transitionLocked = true;

      app.querySelectorAll("button").forEach(button => {
        button.disabled = true;
      });

      app.classList.remove("page-fade-in");
      app.classList.add("page-fade-out");

      setTimeout(() => {
        callback();
        transitionLocked = false;
      }, 280);
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function dots(activeIndex) {
      return `
        <div class="progress" aria-hidden="true">
          ${[0, 1, 2].map(i => `<span class="dot ${i === activeIndex ? "active" : ""}"></span>`).join("")}
        </div>
      `;
    }

    function countdownPage(number) {
      const messages = {
        3: "Okay… here we go 😅",
        2: "Wait… why am I suddenly nervous?",
        1: "Alright… this is the part I’ve been waiting for 🤍"
      };

      const buttonLabels = {
        3: "Here we go",
        2: "A little more",
        1: "One last step"
      };

      const countdownMascots = {
        3: "assets/bear-countdown-3.png",
        2: "assets/bear-countdown-2.png",
        1: "assets/bear-countdown-1.png"
      };

      app.innerHTML = `
        <div class="content soft-center">
          <div>
            <img class="mascot mascot-large" src="${countdownMascots[number]}" alt="" />
<div class="countdown-number">${number}</div>
            <p>${messages[number] || "Okay… here we go 🤍"}</p>
          </div>
        </div>
        <div class="controls">
          <button onclick="goNext()">${buttonLabels[number] || "Next"}</button>
        </div>
      `;
    }

    function render() {
      if (step === 0) {
        app.innerHTML = `
          <div class="content">
<img class="mascot" src="assets/bear-welcome.png" alt="" />
            <h1>I made something small for you.</h1>
            <p>It’s not perfect, but it’s from me. So… please go through this little page first.</p>
          </div>
          <div class="controls">
            <button onclick="goNext()">Start</button>
            ${dots(0)}
          </div>
        `;
      }

      if (step === 1) {
        app.innerHTML = `
          <div class="content">
<img class="mascot" src="assets/bear-name.png" alt="" />
            <h1>And your name?</h1>
            <p>Just so this little page knows who it was made for.</p>
          </div>
          <div class="controls">
            <label for="personName">Name</label>
            <input id="personName" type="text" placeholder="Your name" autocomplete="name" value="${escapeHTML(personName)}" />
            <div class="error" id="nameError"></div>
            <button onclick="saveName()">Continue</button>
            ${dots(1)}
          </div>
        `;
        setTimeout(() => document.getElementById("personName").focus(), 100);
      }

      if (step === 2) {
        const safeName = escapeHTML(personName.trim());
        app.innerHTML = `
          <div class="content">
<img class="mascot" src="assets/bear-letter.png" alt="" />
            <h1>Dear ${safeName},</h1>
            <p>I’m not always good at saying things at the right time, so I made this little page for you.</p>
            <div class="note typewriter typing-caret" id="dearNote" role="button" tabindex="0" aria-label="Tap to reveal the full message"></div>
            <div class="type-hint" id="typeHint">Tap the message to show all</div>
          </div>
          <div class="controls">
            <button onclick="goNext()">Keep going</button>
            ${dots(2)}
          </div>
        `;
      }

      if (step === 3) {
        countdownPage(3);
      }

      if (step === 4) {
        countdownPage(2);
      }

      if (step === 5) {
        countdownPage(1);
      }

      if (step === 6) {
        app.innerHTML = `
          <div class="content soft-center">
            <div>
              <img class="mascot mascot-large" src="assets/bear-peek.png" alt="" />
<h1>Are you sure?</h1>
              <p class="sure-copy">If you press this, there’s no going back for me anymore.</p>
              <p class="mini-note">Okay maybe a little dramatic… but I mean it 🤍</p>
            </div>
          </div>
          <div class="controls">
            <button onclick="confirmReveal(this)">Okay… show me 🤍</button>
          </div>
        `;
      }

      if (step === 7) {
        app.innerHTML = `
          <div class="content soft-center final-stage">
            <div>
              <img class="mascot mascot-large final-mascot bouquet-sway" src="assets/bear-flower.png" alt="" />
<h1 class="final-question">
                <span class="question-line first">Can you</span>
                <span class="question-line main">be my girlfriend?</span>
              </h1>
              <p class="final-subcopy">And then… please look at me.</p>
            </div>
          </div>
          <div class="controls final-button-wrap">
            <button class="final-exit-button" onclick="leaveFinalPage(this)">
              Look at me <span class="final-heartbeat">🤍</span>
            </button>
          </div>
        `;
      }

      if (step === 8) {
        app.innerHTML = `
          <div class="content soft-center look-stage">
            <div>
              <img class="mascot mascot-large look-mascot" src="assets/bear-point.png" alt="" />
              <h1 class="look-title">Now look at me.</h1>
              <p class="look-subcopy">I’ll ask you properly myself. 🤍</p>
            </div>
          </div>
        `;
      }

      setupAfterRender();
    }



    function setupAfterRender() {
      clearTyping();
      clearEffects();
      applyMood(step, firstRender);
      firstRender = false;

      app.classList.remove("page-fade-out", "page-fade-in");
      void app.offsetWidth;
      app.classList.add("page-fade-in");
      setTimeout(() => app.classList.remove("page-fade-in"), 480);

      enableMascotReaction();
      createTapHint();

      if (step === 2) {
        setTimeout(startDearTyping, 220);
      }

      app.classList.toggle("final-mode", step === 7);

      if (step === 7) {
        startFinalReveal();
      }

      if (step === 8) {
        startLookReveal();
      }
    }


    function startFinalReveal() {
      const stage = app.querySelector(".final-stage");
      if (!stage) return;

      const mascot = stage.querySelector(".final-mascot");
      const kicker = stage.querySelector(".final-kicker");
      const firstLine = stage.querySelector(".question-line.first");
      const mainLine = stage.querySelector(".question-line.main");
      const subcopy = stage.querySelector(".final-subcopy");
      const buttonWrap = app.querySelector(".final-button-wrap");

      const reveal = (element, delay) => {
        if (!element) return;
        setTimeout(() => {
          if (step === 7 && document.body.contains(element)) {
            element.classList.add("show");
          }
        }, delay);
      };

      reveal(mascot, 160);
      reveal(kicker, 620);
      reveal(firstLine, 1050);
      reveal(mainLine, 1510);
      reveal(subcopy, 2080);
      reveal(buttonWrap, 2600);

      setTimeout(() => {
        if (step === 7) launchLoveParticles();
      }, 1050);
    }


    function leaveFinalPage(button) {
      if (!button || button.disabled || transitionLocked) return;

      transitionLocked = true;
      button.disabled = true;
      button.classList.add("is-leaving");
      button.textContent = "Okay… here goes 😳";

      fadeOutBefore(() => {
        step = 8;
        render();
        transitionLocked = false;
      }, 1000);
    }

    function startLookReveal() {
      clearEffects();
      app.classList.remove("final-mode");

      const stage = app.querySelector(".look-stage");
      if (!stage) return;

      const mascot = stage.querySelector(".look-mascot");
      const title = stage.querySelector(".look-title");
      const subcopy = stage.querySelector(".look-subcopy");

      setTimeout(() => {
        if (step === 8) stage.classList.add("show");
      }, 80);

      setTimeout(() => {
        if (step === 8 && mascot) mascot.classList.add("show");
      }, 220);

      setTimeout(() => {
        if (step === 8 && title) title.classList.add("show");
      }, 760);

      setTimeout(() => {
        if (step === 8 && subcopy) subcopy.classList.add("show");
      }, 1500);
    }


    function createTapHint() {
      const mascot = app.querySelector(".mascot");
      if (!mascot) return;

      const existingHint = app.querySelector(".tap-hint");
      if (existingHint) existingHint.remove();

      const hint = document.createElement("div");
      hint.className = "tap-hint is-soft";
      hint.innerHTML = 'psst… <span class="tap-word">tap</span> the bear 🤍';

      mascot.insertAdjacentElement("afterend", hint);
    }

    function enableMascotReaction() {
      const mascot = app.querySelector(".mascot");
      if (!mascot) return;

      const reactions = {
        0: "Hi 👋 I promise this won’t take long.",
        1: "Take your time… I’ll wait.",
        2: "I practiced this part in my head a lot 😅",
        3: "Still okay… probably.",
        4: "Why did I add a countdown? 😳",
        5: "Too late to run now.",
        6: "You made it this far 👀",
        7: "This one’s really from me 🤍",
        8: "Yep… me. Look up now."
      };

      mascot.setAttribute("role", "button");
      mascot.setAttribute("tabindex", "0");
      mascot.setAttribute("aria-label", "Tap the bear");

      const react = () => showMascotReaction(mascot, reactions[step] || "Hi 🤍");
      mascot.addEventListener("click", react);
      mascot.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          react();
        }
      });
    }

    function showMascotReaction(mascot, message) {
      mascot.classList.remove("is-reacting");
      void mascot.offsetWidth;
      mascot.classList.add("is-reacting");

      let bubble = app.querySelector(".reaction-bubble");
      if (!bubble) {
        bubble = document.createElement("div");
        bubble.className = "reaction-bubble";
        app.appendChild(bubble);
      }

      bubble.textContent = message;
      bubble.classList.add("show");

      clearTimeout(reactionTimer);
      reactionTimer = setTimeout(() => bubble.classList.remove("show"), 2100);
    }

    function startDearTyping() {
      const note = document.getElementById("dearNote");
      const hint = document.getElementById("typeHint");
      if (!note) return;

      typingFullText = [
        "I know… I may have made you wait a little too long already 😅",
        "",
        "So I thought it’s finally time to say this properly.",
        "",
        "I just really like being around you.",
        "It feels easy, and somehow my day is always a bit better with you.",
        "",
        "So there’s one thing I want to ask you."
      ].join("\n");

      let index = 0;
      note.textContent = "";
      note.classList.add("typing-caret");

      const finish = () => {
        clearTyping();
        note.textContent = typingFullText;
        note.classList.remove("typing-caret");
        if (hint) hint.style.opacity = "0";
      };

      note.addEventListener("click", finish, { once: true });
      note.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          finish();
        }
      }, { once: true });

      const typeNext = () => {
        if (!document.body.contains(note)) return;
        note.textContent = typingFullText.slice(0, index + 1);
        index += 1;

        if (index >= typingFullText.length) {
          note.classList.remove("typing-caret");
          if (hint) hint.style.opacity = "0";
          typingTimer = null;
          return;
        }

        const current = typingFullText[index - 1];
        const delay = current === "\n" ? 180 : /[.!?]/.test(current) ? 220 : 34;
        typingTimer = setTimeout(typeNext, delay);
      };

      typeNext();
    }

    function clearTyping() {
      if (typingTimer) {
        clearTimeout(typingTimer);
        typingTimer = null;
      }
    }

    function launchLoveParticles() {
      const symbols = ["♡", "♥", "❀", "♡", "♥"];
      const total = 8;

      for (let i = 0; i < total; i += 1) {
        const particle = document.createElement("span");
        particle.className = "love-particle";
        particle.textContent = symbols[i % symbols.length];

        const x = 8 + Math.random() * 84;
        const size = 16 + Math.random() * 16;
        const duration = 3.2 + Math.random() * 1.8;
        const delay = Math.random() * 0.9;
        const drift = `${-70 + Math.random() * 140}px`;
        const rotate = `${-25 + Math.random() * 50}deg`;
        const colors = ["#d9788f", "#ee9aad", "#c55f79", "#f0b3bf"];

        particle.style.setProperty("--x", `${x}%`);
        particle.style.setProperty("--size", `${size}px`);
        particle.style.setProperty("--duration", `${duration}s`);
        particle.style.setProperty("--delay", `${delay}s`);
        particle.style.setProperty("--drift", drift);
        particle.style.setProperty("--rotate", rotate);
        particle.style.color = colors[i % colors.length];

        effectsLayer.appendChild(particle);
        setTimeout(() => particle.remove(), (duration + delay + 0.4) * 1000);
      }
    }

    function clearEffects() {
      effectsLayer.innerHTML = "";
    }

    function playPageTransition(callback, delay = 1050, shakeDuration = 900) {
      if (transitionLocked) return;
      transitionLocked = true;

      clearTyping();

      app.querySelectorAll("button").forEach(button => {
        button.disabled = true;
      });

      const mascot = app.querySelector(".mascot");
      if (mascot) {
        mascot.classList.remove("is-reacting", "page-transition-shake");
        mascot.style.setProperty("--shake-duration", `${shakeDuration}ms`);
        void mascot.offsetWidth;
        mascot.classList.add("page-transition-shake");
      }

      fadeOutBefore(() => {
        callback();
        transitionLocked = false;
      }, delay);
    }

    function confirmReveal(button) {
      if (!button || button.disabled || transitionLocked) return;

      transitionLocked = true;
      button.disabled = true;
      button.textContent = "No turning back now 😳";
      button.style.opacity = "0.94";

      fadeOutBefore(() => {
        step += 1;
        render();
        transitionLocked = false;
      }, 2000);
    }

    function goNext() {
      // Countdown page "3" changes immediately without shaking.
      // Countdown pages "2" and "1" still use the nervous shake.
      if (step === 3) {
        changePageWithoutShake(() => {
          step += 1;
          render();
        });
        return;
      }

      playPageTransition(() => {
        step += 1;
        render();
      });
    }

    function saveName() {
      const input = document.getElementById("personName");
      const error = document.getElementById("nameError");
      personName = input.value.trim();

      if (!personName) {
        error.textContent = "Please enter your name first.";
        return;
      }

      changePageWithoutShake(() => {
        step = 2;
        render();
      });
    }

    function restart() {
      clearTyping();
      clearEffects();
      transitionLocked = false;
      step = 0;
      personName = "";
      render();
    }

    preloadMascots();
    render();
  </script>
</body>
</html>
